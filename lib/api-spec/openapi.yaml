openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: CleanOps Pro - Multi-tenant SaaS API for cleaning businesses
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session management
  - name: companies
    description: Company management
  - name: users
    description: Employee/user management
  - name: clients
    description: Client management
  - name: jobs
    description: Job scheduling and management
  - name: timeclock
    description: Time clock management
  - name: invoices
    description: Invoice management
  - name: scorecards
    description: Employee scorecards
  - name: photos
    description: Job photos
  - name: payroll
    description: Payroll summary and exports
  - name: loyalty
    description: Loyalty program
  - name: dashboard
    description: Dashboard metrics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /companies/me:
    get:
      operationId: getMyCompany
      tags: [companies]
      summary: Get current user's company
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

    put:
      operationId: updateMyCompany
      tags: [companies]
      summary: Update current user's company
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List employees
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [owner, admin, office, technician]
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

    post:
      operationId: createUser
      tags: [users]
      summary: Create employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get employee by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateUser
      tags: [users]
      summary: Update employee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete/deactivate employee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Employee deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/scorecards:
    get:
      operationId: getUserScorecards
      tags: [users]
      summary: Get employee scorecards
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Employee scorecards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorecardListResponse"

  /users/{id}/additional-pay:
    get:
      operationId: getUserAdditionalPay
      tags: [users]
      summary: Get employee additional pay records
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Additional pay records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalPayListResponse"

    post:
      operationId: createAdditionalPay
      tags: [users]
      summary: Add additional pay for employee
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdditionalPayRequest"
      responses:
        "201":
          description: Additional pay created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalPay"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"

    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateClient
      tags: [clients]
      summary: Update client
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete client
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, in_progress, complete, cancelled]
        - name: assigned_user_id
          in: query
          schema:
            type: integer
        - name: client_id
          in: query
          schema:
            type: integer
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

    post:
      operationId: createJob
      tags: [jobs]
      summary: Create job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /jobs/{id}/complete:
    post:
      operationId: completeJob
      tags: [jobs]
      summary: Mark job as complete (requires after photos)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Job completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"

  /jobs/{id}/photos:
    get:
      operationId: getJobPhotos
      tags: [photos]
      summary: Get job photos
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Job photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoListResponse"

    post:
      operationId: uploadJobPhoto
      tags: [photos]
      summary: Upload job photo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPhotoRequest"
      responses:
        "201":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /timeclock:
    get:
      operationId: listTimeclock
      tags: [timeclock]
      summary: List time clock entries
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
        - name: job_id
          in: query
          schema:
            type: integer
        - name: flagged
          in: query
          schema:
            type: boolean
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Time clock entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeclockListResponse"

  /timeclock/clock-in:
    post:
      operationId: clockIn
      tags: [timeclock]
      summary: Clock in to a job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInRequest"
      responses:
        "201":
          description: Clock in recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeclockEntry"

  /timeclock/{id}/clock-out:
    post:
      operationId: clockOut
      tags: [timeclock]
      summary: Clock out from a job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutRequest"
      responses:
        "200":
          description: Clock out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeclockEntry"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue]
        - name: client_id
          in: query
          schema:
            type: integer
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"

    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/send:
    post:
      operationId: sendInvoice
      tags: [invoices]
      summary: Send invoice to client
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Invoice sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /scorecards:
    get:
      operationId: listScorecards
      tags: [scorecards]
      summary: List scorecards
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
        - name: client_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of scorecards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorecardListResponse"

    post:
      operationId: createScorecard
      tags: [scorecards]
      summary: Create scorecard
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScorecardRequest"
      responses:
        "201":
          description: Scorecard created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scorecard"

  /payroll/summary:
    get:
      operationId: getPayrollSummary
      tags: [payroll]
      summary: Get payroll summary for a pay period
      security:
        - bearerAuth: []
      parameters:
        - name: pay_period_start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: pay_period_end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Payroll summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollSummaryResponse"

  /loyalty/settings:
    get:
      operationId: getLoyaltySettings
      tags: [loyalty]
      summary: Get loyalty program settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loyalty settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltySettings"

    put:
      operationId: updateLoyaltySettings
      tags: [loyalty]
      summary: Update loyalty program settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltySettings"
      responses:
        "200":
          description: Loyalty settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltySettings"

  /loyalty/points/{clientId}:
    get:
      operationId: getClientLoyaltyPoints
      tags: [loyalty]
      summary: Get client loyalty points and history
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client loyalty points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientLoyaltyResponse"

  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get dashboard metrics
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
            default: week
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, admin, office, technician, super_admin]
        company_id:
          type: integer
        avatar_url:
          type: string
          nullable: true
      required:
        - id
        - email
        - first_name
        - last_name
        - role
        - company_id

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo_url:
          type: string
          nullable: true
        subscription_status:
          type: string
          enum: [active, past_due, canceled, trialing]
        plan:
          type: string
          enum: [starter, growth, enterprise]
        employee_count:
          type: integer
        pay_cadence:
          type: string
          enum: [weekly, biweekly, semimonthly]
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - subscription_status
        - plan
        - employee_count
        - pay_cadence
        - created_at

    UpdateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        logo_url:
          type: string
          nullable: true
        pay_cadence:
          type: string
          enum: [weekly, biweekly, semimonthly]
        geo_fence_threshold_ft:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, admin, office, technician]
        pay_rate:
          type: number
          nullable: true
        pay_type:
          type: string
          enum: [hourly, per_job, fee_split]
          nullable: true
        is_active:
          type: boolean
        hire_date:
          type: string
          format: date
          nullable: true
        avatar_url:
          type: string
          nullable: true
        productivity_pct:
          type: number
          nullable: true
      required:
        - id
        - email
        - first_name
        - last_name
        - role
        - is_active

    UserDetail:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            phone:
              type: string
              nullable: true
            address:
              type: string
              nullable: true
            dob:

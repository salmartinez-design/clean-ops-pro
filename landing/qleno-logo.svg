<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Mint green circle background -->
  <circle cx="256" cy="256" r="240" fill="#3DDC97"/>

  <!-- Bold white Q: outer ring + inner cutout + tail -->
  <g fill="#FFFFFF">
    <!-- Q body: thick ring made from two circles with even-odd fill -->
    <path fill-rule="evenodd" d="
      M 256 112
      a 128 128 0 1 1 0 256
      a 128 128 0 1 1 0 -256
      z
      M 256 176
      a 64 64 0 1 0 0 128
      a 64 64 0 1 0 0 -128
      z
    "/>
    <!-- Q tail -->
    <rect x="300" y="316" width="64" height="26" rx="13" transform="rotate(45 332 329)"/>
  </g>

  <!-- Three shine burst lines, top-right -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="396" y1="116" x2="438" y2="74"/>
    <line x1="420" y1="168" x2="470" y2="150"/>
    <line x1="348" y1="92" x2="366" y2="42"/>
  </g>
</svg>

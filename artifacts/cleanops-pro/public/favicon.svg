<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mint green rounded square background -->
  <rect width="64" height="64" rx="14" fill="#00C9A0"/>

  <!-- Three white shine lines — left side -->
  <!-- Upper-left (~10 o'clock), diagonal 45° -->
  <line x1="23" y1="20" x2="13" y2="10"
    stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
  <!-- Left — perfectly horizontal -->
  <line x1="20" y1="32" x2="8" y2="32"
    stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
  <!-- Lower-left (~8 o'clock), diagonal 45° -->
  <line x1="23" y1="44" x2="13" y2="54"
    stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.88"/>

  <!-- Bold white Q, centered right of center -->
  <text
    x="40" y="32"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central">Q</text>
</svg>
